name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (for example: v0.1.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  publish-tauri:
    name: Build ${{ matrix.platform }} ${{ matrix.args }}
    runs-on: ${{ matrix.platform }}
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: "--target aarch64-apple-darwin"
          - platform: macos-latest
            args: "--target x86_64-apple-darwin"
          - platform: ubuntu-22.04
            args: ""
          - platform: windows-latest
            args: ""

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Add macOS Rust targets
        if: matrix.platform == 'macos-latest'
        run: rustup target add aarch64-apple-darwin x86_64-apple-darwin

      - name: Cache Rust dependencies
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libappindicator3-dev \
            libasound2-dev \
            librsvg2-dev \
            patchelf

      - name: Install JavaScript dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate release tag and app versions
        shell: bash
        run: |
          set -euo pipefail
          if [[ ! "${RELEASE_TAG}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([.-].+)?$ ]]; then
            echo "Release tag must look like vX.Y.Z (or pre-release variants), got: ${RELEASE_TAG}"
            exit 1
          fi

          TAG_VERSION="${RELEASE_TAG#v}"
          PKG_VERSION="$(node --input-type=module -e "import fs from 'node:fs'; const p = JSON.parse(fs.readFileSync('package.json', 'utf8')); process.stdout.write(p.version);")"
          TAURI_VERSION="$(node --input-type=module -e "import fs from 'node:fs'; const c = JSON.parse(fs.readFileSync('src-tauri/tauri.conf.json', 'utf8')); process.stdout.write(c.version);")"

          if [[ "${TAG_VERSION}" != "${PKG_VERSION}" ]]; then
            echo "Tag version ${TAG_VERSION} does not match package.json version ${PKG_VERSION}"
            exit 1
          fi
          if [[ "${TAG_VERSION}" != "${TAURI_VERSION}" ]]; then
            echo "Tag version ${TAG_VERSION} does not match src-tauri/tauri.conf.json version ${TAURI_VERSION}"
            exit 1
          fi

      - name: Validate Apple certificate import
        if: matrix.platform == 'macos-latest'
        shell: bash
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          set -euo pipefail

          CERT_PATH="$RUNNER_TEMP/apple-cert.p12"
          KEYCHAIN_PATH="$HOME/Library/Keychains/tauri-cert-test.keychain-db"
          KEYCHAIN_PASSWORD="temporary-test-password"

          # Decode cert from secret and assert keychain import works on the runner.
          echo "$APPLE_CERTIFICATE" | base64 -D > "$CERT_PATH"
          ls -lh "$CERT_PATH"
          shasum -a 256 "$CERT_PATH"

          rm -f "$KEYCHAIN_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/pkgbuild \
            -T /usr/bin/productbuild \
            -k "$KEYCHAIN_PATH"
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"
          security delete-keychain "$KEYCHAIN_PATH"

      - name: Build and publish Tauri release assets
        uses: tauri-apps/tauri-action@v0.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          tauriScript: pnpm tauri
          tagName: ${{ env.RELEASE_TAG }}
          releaseName: Frajola ${{ env.RELEASE_TAG }}
          releaseBody: |
            Automated release for ${{ env.RELEASE_TAG }}.

            Download the desktop installer for your platform below.
          releaseDraft: false
          prerelease: ${{ contains(env.RELEASE_TAG, '-') }}
          args: ${{ matrix.args }}
